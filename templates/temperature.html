{{define "content"}} {{if .}}
<form method="POST">
  <div>
    <h2>Result of your calculation</h2>
    <h3 class="result">{{.ValueBefore}} {{.From}} = {{.ValueAfter}} {{.To}}</h3>
    <a href="/temperature" class="resetBtn">Reset</a>
  </div>
</form>
{{else}}
<form method="POST">
  <div class="input-container">
    <label for="value">Enter the temperature to convert</label>
    <input name="value" id="value" type="number" placeholder="0" />
  </div>

  <div class="input-container">
    <label for="from">Unit to convert from </label>
    <select name="from" id="from">
      <option value="Celsius" selected>Celsius</option>
      <option value="Fahrenheit">Fahrenheit</option>
      <option value="Kelvin">Kelvin</option>
    </select>
  </div>

  <div class="input-container">
    <label for="to">Unit to convert to</label>
    <select name="to" id="to">
      <option value="Celsius">Celsius</option>
      <option value="Fahrenheit" selected>Fahrenheit</option>
      <option value="Kelvin">Kelvin</option>
    </select>
  </div>

  <button type="submit">Convert</button>
</form>
{{end}} {{end}}
